<!DOCTYPE html>
<html>
<head>
    <title>Toggle</title>
</head>
<body>
    <button id="btn" onclick="toggle()">Amagar</button>
    <p id="text">Aquest és un text que apareix i desapareix.</p>

    <script>
        function toggle() {
            const p = document.getElementById('text');
            const btn = document.getElementById('btn');
            if (p.style.display === "none") {
                p.style.display = "block";
                btn.innerText = "Amagar";
            } else {
                p.style.display = "none";
                btn.innerText = "Mostrar";
            }
        }
    </script>
</body>
</html>
