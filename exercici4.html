<!DOCTYPE html>
<html>
<head>
    <title>Ex 4</title>
</head>
<body>

    <button id="boto" onclick="toggle()">Amagar</button>
    <p id="text">Aquest és el text que pots amagar.</p>

    <script>
        function toggle() {
            const text = document.getElementById("text");
            const boto = document.getElementById("boto");
// Comprovem si el text està amagat o visible
            if (text.style.display === "none") {
                text.style.display = "";
                boto.textContent = "Amagar";
 // Si estava visible, l'amaga
            } else {
                text.style.display = "none";
                boto.textContent = "Mostrar";
            }
        }
    </script>

</body>
</html>
