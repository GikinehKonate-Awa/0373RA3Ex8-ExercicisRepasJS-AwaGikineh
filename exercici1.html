<!DOCTYPE html>
<html>
<head>
    <title>Ex 1</title>
</head>
<body>
<!-- Caixa on l'usuari escriu el seu nom -->
    <input type="text" id="nom" placeholder="El teu nom">
<!-- Botó que quan es prem crida la funció saludar -->
    <button onclick="saludar()">Saludar</button>
 <!-- Paràgraf buit on apareixerà el missatge -->
    <p id="resultat"></p>

    <script>
        function saludar() {
    // Agafem el text que ha escrit l'usuari a la caixa
            const nom = document.getElementById("nom").value;
    // Posem el missatge dins del paràgraf ajuntant textos
            document.getElementById("resultat").textContent = "Hola, " + nom + ", benvingut/da!";
        }
    </script>

</body>
</html>
