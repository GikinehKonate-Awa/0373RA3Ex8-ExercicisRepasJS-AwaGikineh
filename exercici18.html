<!DOCTYPE html>
<html>
<head>
    <title>Ex 18</title>
</head>
<body>

    <input type="text" id="entrada" placeholder="Escriu text aquí">
    <button onclick="copiar()">Copiar</button>
    
    <!-- Aquí apareixerà el text copiat -->
    <span id="sortida"></span>

    <script>
        function copiar() {
            // Llegim el text de la caixa d'entrada
            const text = document.getElementById("entrada").value;
            
            // Posem el mateix text dins del span
            document.getElementById("sortida").textContent = text;
        }
    </script>

</body>
</html>
