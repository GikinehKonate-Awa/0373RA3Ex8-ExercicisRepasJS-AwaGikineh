<!DOCTYPE html>
<html>
<head>
    <title>Ex 3</title>
</head>
<body>
 <!-- Aquí es veurà el número actual -->
    <p id="numero">0</p>
    <button onclick="incrementar()">Incrementar</button>
    <button onclick="decrementar()">Decrementar</button>

    <script>
      // Variable que guarda el número actual, comença en 0
        let numero = 0;

        function incrementar() {
    // Sumem 1 al número i actualitzem el que es veu a la pantalla
            numero++;
            document.getElementById("numero").textContent = numero;
        }
     // Restem 1 al número i actualitzem el que es veu a la pantalla
        function decrementar() {
            numero--;
            document.getElementById("numero").textContent = numero;
        }
    </script>

</body>
</html>
