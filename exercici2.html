<!DOCTYPE html>
<html>
<head>
    <title>Ex 2</title>
</head>
<body>
 <!-- Cada botó crida la mateixa funció però amb un color diferent -->
    <button onclick="canviarColor('red')">Vermell</button>
    <button onclick="canviarColor('blue')">Blau</button>
    <button onclick="canviarColor('green')">Verd</button>

    <script>
    // Canviem el color de fons de tota la pàgina
        function canviarColor(color) {
            document.body.style.backgroundColor = color;
        }
    </script>

</body>
</html>
