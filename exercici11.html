<!DOCTYPE html>
<html>
<body>
    <button onclick="afegir()">Afegir Element</button>
    <ul id="llista"></ul>
    <script>
        function afegir() {
            const llista = document.getElementById('llista');
            const li = document.createElement('li');
            li.innerText = `Element número ${llista.children.length + 1}`;
            llista.appendChild(li);
        }
    </script>
</body>
</html>
