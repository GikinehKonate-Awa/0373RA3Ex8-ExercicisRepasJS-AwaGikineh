<!DOCTYPE html>
<html>
<head>
    <title>Ex 9</title>
</head>
<body>

    <!-- oninput vol dir que la funció s'executa cada vegada que s'escriu una lletra -->
    <input type="text" id="entrada" placeholder="Escriu aquí..." oninput="actualitzar()">
    <p id="resultat">El text apareixerà aquí</p>

    <script>
        function actualitzar() {
            // Llegim el text que hi ha a la caixa en aquest moment
            const text = document.getElementById("entrada").value;
            const p = document.getElementById("resultat");

            // Mostrem el text al paràgraf
            p.textContent = text;
            
            // Com més caràcters hi ha, més gran es fa la lletra
            p.style.fontSize = (14 + text.length) + "px";
            
            // Generem un número aleatori entre 0 i 360 per tenir un color diferent cada vegada
            p.style.color = "hsl(" + Math.floor(Math.random() * 360) + ", 60%, 40%)";
        }
    </script>

</body>
</html>
