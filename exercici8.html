<!DOCTYPE html>
<html>
<head>
    <title>Ex 8</title>
</head>
<body>

    <!-- Aquí es mostrarà la tecla que l'usuari ha premut -->
    <h1 id="tecla">Prem una tecla...</h1>

    <script>
        // Escoltem quan l'usuari prem qualsevol tecla del teclat
        document.addEventListener("keydown", function(event) {
        // event.key conté el nom de la tecla premuda
            document.getElementById("tecla").textContent = event.key;
        });
    </script>

</body>
</html>
