<!DOCTYPE html>
<html>
<head>
    <title>Ex 7</title>
</head>
<body>

    <!-- Imatge que canviarà quan es premi el botó -->
    <img id="imatge" src="https://picsum.photos/seed/a/200/150">
    <br>
    <button onclick="canviarImatge()">Canviar imatge</button>

    <script>
        // Llista amb les adreces de les tres imatges
        const imatges = [
            "https://picsum.photos/seed/a/200/150",
            "https://picsum.photos/seed/b/200/150",
            "https://picsum.photos/seed/c/200/150"
        ];
        
        // Guardem en quina imatge estem ara mateix
        let index = 0;

        function canviarImatge() {
            // Passem a la següent imatge
            index++;
            
            // Si hem arribat al final de la llista, tornem a la primera
            if (index >= imatges.length) index = 0;
            
            // Canviem l'adreça de la imatge per mostrar la nova
            document.getElementById("imatge").src = imatges[index];
        }
    </script>

</body>
</html>
