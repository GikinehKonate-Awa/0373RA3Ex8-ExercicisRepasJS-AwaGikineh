<!DOCTYPE html>
<html>
<head>
    <title>Ex 6</title>
</head>
<body>

    <input type="number" id="edat" placeholder="Edat">
    <button onclick="validar()">Enviar</button>
    
    <!-- Aquí apareixerà el missatge en vermell o verd -->
    <p id="missatge"></p>

    <script>
        function validar() {
            // Llegim l'edat que ha escrit l'usuari
            const edat = document.getElementById("edat").value;
            const missatge = document.getElementById("missatge");

            // Comprovem si l'edat és menor o major de 18
            if (edat < 18) {
                missatge.textContent = "Ets menor d'edat";
                missatge.style.color = "red";
            } else {
                missatge.textContent = "Accés permès";
                missatge.style.color = "green";
            }
        }
    </script>

</body>
</html>
